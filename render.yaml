services:
  - type: web
    name: hostel-energy-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r MLmodel/requirements.txt
    startCommand: gunicorn --chdir MLmodel app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: hostel-energy-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

services:
  - type: web
    name: hostel-energy-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r MLmodel/requirements.txt
    startCommand: cd MLmodel && gunicorn app:app

  - type: web
    name: hostel-energy-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
